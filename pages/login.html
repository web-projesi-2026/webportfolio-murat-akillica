<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Murat Akıllıca Portfolio – Giriş Yap">
  <meta name="robots" content="noindex, nofollow">
  <title>Giriş Yap – Murat Akıllıca</title>
  <link rel="icon" type="image/png" href="../assets/img/favicon.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="../index.html" class="navbar__logo">MA.</a>
      <nav class="navbar__nav">
        <ul>
          <li><a href="../index.html">Ana Sayfa</a></li>
          <li><a href="about.html">Hakkımda</a></li>
          <li><a href="proje.html">Projeler</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="contact.html">İletişim</a></li>
        </ul>
      </nav>
      <div class="navbar__actions">
        <button class="theme-toggle" title="Tema değiştir">
          <span class="icon-sun"><i class="fa-solid fa-sun"></i></span>
          <span class="icon-moon"><i class="fa-solid fa-moon"></i></span>
        </button>
        <div class="navbar__hamburger"><span></span><span></span><span></span></div>
      </div>
    </div>
  </header>

  <div style="position:fixed;inset:0;z-index:0;pointer-events:none;">
    <div class="hero__orb hero__orb--1" style="opacity:0.15;"></div>
    <div class="hero__orb hero__orb--2" style="opacity:0.1;"></div>
  </div>

  <main class="auth-page">
    <div class="auth-card" style="position:relative;z-index:1;">
      <div class="auth-card__header">
        <div class="auth-card__logo">MA.</div>
        <h2 class="auth-card__title">Tekrar Hoşgeldiniz!</h2>
        <p class="auth-card__sub">Hesabınıza giriş yapın</p>
      </div>

      <form id="loginForm" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label">E-posta Adresi <span style="color:#ef4444;">*</span></label>
          <input type="email" name="email" class="form-input" placeholder="ornek@mail.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre <span style="color:#ef4444;">*</span></label>
          <div style="position:relative;">
            <input type="password" name="password" id="passwordInput" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right:3rem;">
            <button type="button" id="eyeBtn" onclick="togglePassword()"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted);transition:color 0.2s;"
              title="Şifreyi göster/gizle">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
          <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;cursor:pointer;">
            <input type="checkbox" name="remember" style="accent-color:var(--accent);"> Beni hatırla
          </label>
          <a href="#" style="font-size:0.85rem;color:var(--accent);">Şifremi unuttum</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.9rem;">
          <i class="fa-solid fa-right-to-bracket" style="margin-right:0.4rem;"></i> Giriş Yap
        </button>
      </form>

      <div class="auth-divider"><span>veya</span></div>

      <button class="btn btn-ghost" style="width:100%;justify-content:center;"
        onclick="showNotification('Google ile giriş yakında aktif olacak!','error')">
        <svg style="width:1rem;height:1rem;margin-right:0.5rem;" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google ile Giriş Yap
      </button>

      <div class="auth-footer">
        Hesabınız yok mu? <a href="register.html">Kayıt Olun →</a>
      </div>
    </div>
  </main>

  <div class="notification"></div>
  <script src="../assets/js/main.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    if (Auth.isLoggedIn()) {
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
